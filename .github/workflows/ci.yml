name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          # nvidia-cublas-cu12 / nvidia-cudnn-cu12 are optional GPU accelerators
          # for faster-whisper (backend/stt.py falls back to CPU silently when
          # they're absent) — excluded here to avoid multi-hundred-MB downloads
          # that don't affect test coverage on CI's CPU-only runners.
          grep -v '^nvidia-' backend/requirements.txt > /tmp/ci-requirements.txt
          pip install -r /tmp/ci-requirements.txt
          pip install pytest pytest-asyncio

      - name: Run backend tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Unit tests
        run: npx ng test --watch=false

      - name: Build
        run: npx ng build

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
